<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline';">
    <title>SPLIQOUR — Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="home.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">

        <header class="app-header">
            <div class="drag-region"></div>
            <div class="header-content">
                <div class="brand">
                    <img src="app-icon.png" alt="Spliqour Pro Icon" style="width:32px;height:32px;object-fit:contain;border-radius:6px;vertical-align:middle;margin-right:8px;">
                    <h1>SPLIQOUR <span class="badge">PRO</span></h1>
                </div>
                <div class="header-actions">
                    <div class="theme-toggle-wrapper" title="Toggle Theme (Ctrl+T)">
                        <span class="theme-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                        </span>
                        <label class="theme-toggle" for="themeSwitch">
                            <input type="checkbox" id="themeSwitch" tabindex="-1">
                            <span class="slider"></span>
                        </label>
                        <span class="theme-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                        </span>
                    </div>
                </div>
            </div>
        </header>

        <main class="home-main">

            <!-- Hero / Welcome Section -->
            <div class="dashboard-hero">
                <div class="hero-text">
                    <h2 class="hero-title">Welcome back</h2>
                    <p class="hero-subtitle">Manage your bars and shops from one place</p>
                </div>
                <div class="hero-stats">
                    <div class="stat-card">
                        <div class="stat-icon">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                        </div>
                        <div class="stat-info">
                            <span class="stat-value" id="statTotalBars">0</span>
                            <span class="stat-label">Total Bars</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon stat-icon--accent">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                        </div>
                        <div class="stat-info">
                            <span class="stat-value" id="statCurrentFY">—</span>
                            <span class="stat-label">Financial Year</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon stat-icon--success">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                        </div>
                        <div class="stat-info">
                            <span class="stat-value" id="statCities">0</span>
                            <span class="stat-label">Cities</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Search + Actions Bar -->
            <div class="home-toolbar">
                <div class="search-box-wrapper">
                    <span class="search-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    </span>
                    <input type="text" id="searchInput" placeholder="Search bars by name, city, or license…"
                        autocomplete="off">
                    <kbd class="search-kbd">
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                        Enter
                    </kbd>
                </div>
                <button id="addBarBtn" class="btn-primary" title="Add New Bar (Ctrl+N)">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Add New Bar
                </button>
            </div>

            <!-- Bar Cards Grid -->
            <div class="bar-grid-container">
                <div id="barList" class="bar-grid" tabindex="-1">
                    <!-- cards injected by home-renderer.js -->
                </div>
                <div id="emptyState" class="empty-state hidden">
                    <div class="empty-illustration">
                        <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    </div>
                    <h3 class="empty-title">No bars found</h3>
                    <p class="empty-desc">Get started by adding your first bar or shop</p>
                    <button class="btn-primary btn-empty-add" id="emptyAddBtn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        Add New Bar
                    </button>
                </div>
            </div>

            <!-- Status bar -->
            <div class="home-status-bar">
                <div class="shortcuts">
                    <span class="shortcut"><kbd>↑</kbd><kbd>↓</kbd> Navigate</span>
                    <span class="shortcut"><kbd>Enter</kbd> Open</span>
                    <span class="shortcut"><kbd>Esc</kbd> Clear</span>
                    <span class="shortcut highlight"><kbd>Ctrl+N</kbd> New Bar</span>
                    <span class="shortcut highlight"><kbd>Ctrl+T</kbd> Theme</span>
                </div>
                <div id="barCount" class="bar-count"></div>
            </div>

        </main>
    </div>

    <script src="home-renderer.js"></script>
</body>

</html>
